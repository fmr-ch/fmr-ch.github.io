<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f0f1a">
  <title>Stock</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root {
      --bg:#0f0f1a; --card:#1a1a2e; --card2:#16213e;
      --accent:#4f8ef7; --green:#2ecc71; --yellow:#f39c12; --red:#e74c3c; --purple:#9b59b6;
      --text:#f0f0f0; --muted:#8888aa; --border:#2a2a4a;
    }
    body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; padding-bottom:80px; }

    .header { background:var(--card); padding:16px 20px 12px; position:sticky; top:0; z-index:100; border-bottom:1px solid var(--border); }
    .header h1 { font-size:18px; font-weight:700; }
    .header-sub { font-size:12px; color:var(--muted); margin-top:2px; }

    .tabs { display:flex; background:var(--card); border-bottom:1px solid var(--border); position:sticky; top:61px; z-index:99; }
    .tab { flex:1; padding:10px 6px; text-align:center; font-size:12px; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s; white-space:nowrap; }
    .tab.active { color:var(--accent); border-bottom-color:var(--accent); }

    .page { display:none; padding:16px; }
    .page.active { display:block; }

    .card { background:var(--card); border-radius:16px; padding:16px; margin-bottom:12px; border:1px solid var(--border); }
    .card-title { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:10px; }

    /* FILTER CHIPS */
    .filter-bar { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:14px; scrollbar-width:none; }
    .filter-bar::-webkit-scrollbar { display:none; }
    .filter-chip { flex-shrink:0; padding:6px 14px; border-radius:20px; font-size:12px; font-weight:600; border:1.5px solid var(--border); color:var(--muted); background:var(--card); cursor:pointer; transition:all 0.15s; white-space:nowrap; }
    .filter-chip.active { border-color:var(--accent); background:rgba(79,142,247,0.15); color:var(--accent); }

    /* STOCK ITEM */
    .stock-item { display:flex; align-items:center; padding:12px 0; border-bottom:1px solid var(--border); cursor:pointer; }
    .stock-item:last-child { border-bottom:none; }
    .stock-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; margin-right:12px; }
    .dot-ok  { background:var(--green); box-shadow:0 0 6px var(--green); }
    .dot-low { background:var(--yellow); box-shadow:0 0 6px var(--yellow); }
    .dot-out { background:var(--red); box-shadow:0 0 6px var(--red); }
    .stock-info { flex:1; min-width:0; }
    .stock-name { font-size:14px; font-weight:600; }
    .stock-meta { font-size:11px; color:var(--muted); margin-top:2px; }
    .stock-qty { text-align:right; flex-shrink:0; }
    .qty-main { font-size:15px; font-weight:700; }
    .qty-unit { font-size:10px; color:var(--muted); }

    .cat-header { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--accent); padding:8px 0 4px; font-weight:700; }

    .badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:700; }
    .badge-red    { background:rgba(231,76,60,0.2);  color:var(--red); }
    .badge-yellow { background:rgba(243,156,18,0.2); color:var(--yellow); }
    .badge-green  { background:rgba(46,204,113,0.2); color:var(--green); }

    .stats-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:12px; }
    .stat-card { background:var(--card); border-radius:12px; padding:12px 8px; text-align:center; border:1px solid var(--border); }
    .stat-value { font-size:20px; font-weight:800; }
    .stat-value.red    { color:var(--red); }
    .stat-value.yellow { color:var(--yellow); }
    .stat-value.green  { color:var(--green); }
    .stat-label { font-size:10px; color:var(--muted); margin-top:2px; }

    .mov-item { display:flex; align-items:center; padding:12px 0; border-bottom:1px solid var(--border); }
    .mov-item:last-child { border-bottom:none; }
    .mov-badge { padding:4px 10px; border-radius:8px; font-size:11px; font-weight:700; flex-shrink:0; margin-right:12px; }
    .mov-compra { background:rgba(46,204,113,0.2); color:var(--green); }
    .mov-uso    { background:rgba(243,156,18,0.2);  color:var(--yellow); }
    .mov-info { flex:1; }
    .mov-name { font-size:14px; font-weight:600; }
    .mov-meta { font-size:11px; color:var(--muted); margin-top:2px; }
    .mov-right { text-align:right; flex-shrink:0; }
    .mov-qty   { font-size:14px; font-weight:700; }
    .mov-price { font-size:11px; color:var(--muted); }
    .mov-delete { background:none; border:none; color:var(--muted); font-size:16px; cursor:pointer; padding:4px 0 4px 8px; }

    .add-btn { position:fixed; bottom:88px; right:20px; width:56px; height:56px; border-radius:50%; background:var(--accent); border:none; color:white; font-size:28px; cursor:pointer; box-shadow:0 4px 20px rgba(79,142,247,0.4); display:flex; align-items:center; justify-content:center; z-index:200; transition:transform 0.15s; }
    .add-btn:active { transform:scale(0.93); }

    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:300; align-items:flex-end; }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--card2); border-radius:24px 24px 0 0; padding:24px 20px 40px; width:100%; max-height:92vh; overflow-y:auto; animation:slideUp 0.25s ease; }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .modal-handle { width:40px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 20px; }
    .modal-title  { font-size:18px; font-weight:700; margin-bottom:20px; }

    .form-group { margin-bottom:16px; }
    .form-label { font-size:12px; color:var(--muted); margin-bottom:6px; display:block; }
    .form-input { width:100%; background:var(--bg); border:2px solid var(--border); border-radius:12px; padding:12px 16px; color:var(--text); font-size:16px; outline:none; transition:border-color 0.2s; appearance:none; }
    .form-input:focus { border-color:var(--accent); }
    .form-input.big { font-size:26px; font-weight:700; text-align:center; }
    .form-input[type=number]::-webkit-inner-spin-button { display:none; }

    .type-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
    .type-btn { padding:14px; border-radius:12px; border:2px solid var(--border); background:var(--bg); color:var(--muted); font-size:14px; font-weight:700; text-align:center; cursor:pointer; transition:all 0.15s; }
    .type-btn.selected-compra { border-color:var(--green);  background:rgba(46,204,113,0.15); color:var(--green); }
    .type-btn.selected-uso    { border-color:var(--yellow); background:rgba(243,156,18,0.15);  color:var(--yellow); }

    .submit-btn { width:100%; padding:16px; background:var(--accent); border:none; border-radius:14px; color:white; font-size:16px; font-weight:700; cursor:pointer; margin-top:8px; transition:opacity 0.2s; }
    .submit-btn:disabled { opacity:0.4; cursor:not-allowed; }

    .item-manage { display:flex; align-items:center; padding:12px 0; border-bottom:1px solid var(--border); }
    .item-manage:last-child { border-bottom:none; }
    .item-manage-info { flex:1; }
    .item-manage-name { font-size:14px; font-weight:600; }
    .item-manage-meta { font-size:11px; color:var(--muted); margin-top:2px; }
    .item-edit-btn { background:none; border:1px solid var(--border); color:var(--muted); padding:5px 10px; border-radius:8px; font-size:12px; cursor:pointer; margin-right:6px; }
    .item-del-btn  { background:none; border:none; color:var(--red); font-size:18px; cursor:pointer; }

    .empty-state { text-align:center; color:var(--muted); padding:40px 0; font-size:14px; }
    .empty-icon  { font-size:40px; margin-bottom:8px; }

    /* NUEVA CATEGORÍA inline */
    .new-cat-row { display:flex; gap:8px; margin-top:8px; }
    .new-cat-input { flex:1; background:var(--bg); border:2px solid var(--accent); border-radius:10px; padding:10px 12px; color:var(--text); font-size:15px; outline:none; }
    .new-cat-confirm { background:var(--accent); border:none; border-radius:10px; color:white; padding:10px 16px; font-size:14px; font-weight:700; cursor:pointer; }
  </style>
</head>
<body>

<div class="header">
  <h1>🛒 Control de Stock</h1>
  <div class="header-sub" id="headerSub">Cargando...</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('comprar')"  id="tab-comprar">Comprar</div>
  <div class="tab"        onclick="showTab('stock')"    id="tab-stock">Stock</div>
  <div class="tab"        onclick="showTab('historial')" id="tab-historial">Historial</div>
  <div class="tab"        onclick="showTab('items')"    id="tab-items">Items</div>
</div>

<!-- COMPRAR -->
<div class="page active" id="page-comprar">
  <div class="stats-row">
    <div class="stat-card"><div class="stat-value red"    id="statOut">0</div><div class="stat-label">Sin stock</div></div>
    <div class="stat-card"><div class="stat-value yellow" id="statLow">0</div><div class="stat-label">Reponer</div></div>
    <div class="stat-card"><div class="stat-value green"  id="statOk">0</div><div class="stat-label">OK</div></div>
  </div>
  <div class="filter-bar" id="filterComprar"></div>
  <div class="card">
    <div class="card-title">Lista de compras</div>
    <div id="buyList"></div>
  </div>
</div>

<!-- STOCK -->
<div class="page" id="page-stock">
  <div class="filter-bar" id="filterStock"></div>
  <div id="stockList"></div>
</div>

<!-- HISTORIAL -->
<div class="page" id="page-historial">
  <div class="filter-bar" id="filterHistorial"></div>
  <div id="histList"></div>
</div>

<!-- ITEMS -->
<div class="page" id="page-items">
  <div class="filter-bar" id="filterItems"></div>
  <button class="submit-btn" onclick="openItemModal()" style="margin-bottom:12px">+ Nuevo item</button>
  <div class="card">
    <div class="card-title">Items cargados</div>
    <div id="itemList"></div>
  </div>
</div>

<button class="add-btn" onclick="openMovModal()">+</button>

<!-- MOVIMIENTO MODAL -->
<div class="modal-overlay" id="movOverlay" onclick="handleOverlay(event,'movOverlay')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Registrar movimiento</div>
    <div class="type-row">
      <div class="type-btn" id="btnCompra" onclick="selType('compra')">🛒 Compra</div>
      <div class="type-btn" id="btnUso"    onclick="selType('uso')">📦 Uso</div>
    </div>
    <div class="form-group">
      <label class="form-label">Item</label>
      <select class="form-input" id="movItem" onchange="movCheck()">
        <option value="">Seleccioná...</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Cantidad</label>
      <input type="number" class="form-input big" id="movQty" placeholder="0" inputmode="decimal" oninput="movCheck()">
    </div>
    <div id="priceGroup" class="form-group" style="display:none">
      <label class="form-label">Precio unitario ($)</label>
      <input type="number" class="form-input big" id="movPrice" placeholder="0" inputmode="numeric">
    </div>
    <div class="form-group">
      <label class="form-label">Notas (opcional)</label>
      <input type="text" class="form-input" id="movNotes" placeholder="Ej: supermercado, oferta...">
    </div>
    <button class="submit-btn" id="movSaveBtn" onclick="saveMov()" disabled>Guardar</button>
  </div>
</div>

<!-- ITEM MODAL -->
<div class="modal-overlay" id="itemOverlay" onclick="handleOverlay(event,'itemOverlay')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="itemModalTitle">Nuevo item</div>
    <div class="form-group">
      <label class="form-label">Nombre</label>
      <input type="text" class="form-input" id="iName" placeholder="Ej: Pechuga de pollo" oninput="itemCheck()">
    </div>

    <!-- CATEGORÍA con opción de nueva -->
    <div class="form-group">
      <label class="form-label">Categoría</label>
      <select class="form-input" id="iCat" onchange="onCatChange()">
        <option value="">Seleccioná...</option>
      </select>
      <div id="newCatRow" class="new-cat-row" style="display:none">
        <input type="text" class="new-cat-input" id="newCatInput" placeholder="Nombre de la categoría...">
        <button class="new-cat-confirm" onclick="confirmNewCat()">Agregar</button>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="form-group">
        <label class="form-label">Unidad</label>
        <select class="form-input" id="iUnit">
          <option>unid</option><option>kg</option><option>g</option><option>litro</option>
          <option>ml</option><option>paquete</option><option>lata</option><option>pote</option>
          <option>frasco</option><option>atado</option><option>bolsa</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Stock objetivo</label>
        <input type="number" class="form-input" id="iTarget" placeholder="0" inputmode="decimal">
      </div>
    </div>
    <input type="hidden" id="iEditId">
    <button class="submit-btn" id="itemSaveBtn" onclick="saveItem()" disabled>Guardar item</button>
  </div>
</div>

<script>
// ── CATEGORÍAS ─────────────────────────────────────────
const BASE_CATS = ["Comida","Limpieza","Higiene","Perro","Casa"];
const CAT_ICONS = {"Comida":"🍽️","Limpieza":"🧹","Higiene":"🧴","Perro":"🐕","Casa":"🏠"};

// Mapeo de categorías legacy → super-categorías
const CAT_MAP = {
  "Proteínas":"Comida","Lácteos":"Comida","Verduras":"Comida",
  "Frutas":"Comida","Almacén":"Comida","Otro":"Casa"
};

function resolveGroup(cat) {
  if (BASE_CATS.includes(cat)) return cat;
  return CAT_MAP[cat] || cat;
}

function getCustomCats() { return JSON.parse(localStorage.getItem('custom_cats') || '[]'); }
function saveCustomCats(arr) { localStorage.setItem('custom_cats', JSON.stringify(arr)); }
function getAllCats() { return [...BASE_CATS, ...getCustomCats()]; }

// ── ESTADO ─────────────────────────────────────────────
let items = JSON.parse(localStorage.getItem('stock_items') || '[]');
let movements = JSON.parse(localStorage.getItem('stock_movements') || '[]');
let movType = null;

// Filtro activo por pestaña
const activeFilter = { comprar:'Todos', stock:'Todos', historial:'Todos', items:'Todos' };

// Pre-carga
if (items.length === 0) {
  const seed = [
    ["Comida","Pechuga de pollo","kg",1.5],["Comida","Carne picada","kg",0.7],
    ["Comida","Churrasco","unid",1],["Comida","Bife","unid",1],
    ["Comida","Filet de pescado","unid",1],["Comida","Atún en lata","lata",2],
    ["Comida","Jamón","paquete",1],["Comida","Hamburguesas","unid",2],["Comida","Huevos","unid",12],
    ["Comida","Yogurt griego","pote",2],["Comida","Yogurt natural","pote",3],
    ["Comida","Queso crema","pote",1],["Comida","Queso en feta","paquete",1],["Comida","Leche","litro",1],
    ["Comida","Calabaza","kg",1],["Comida","Papa","kg",1.5],["Comida","Batata","unid",2],
    ["Comida","Zucchini","unid",1],["Comida","Tomate","unid",6],["Comida","Zanahoria","unid",2],
    ["Comida","Cebolla","unid",3],["Comida","Espinaca","atado",1],["Comida","Palta","unid",1],
    ["Comida","Lechuga","unid",1],["Comida","Banana","unid",8],["Comida","Manzana","unid",3],
    ["Comida","Arroz integral","paquete",1],["Comida","Fideos","paquete",1],
    ["Comida","Tapa de tarta","unid",1],["Comida","Tostadas integrales","paquete",1],
    ["Comida","Galletas de arroz","paquete",1],["Comida","Avena","paquete",1],
    ["Comida","Granola","paquete",1],["Comida","Frutos secos","bolsa",1],
    ["Comida","Manteca de maní","frasco",1],["Comida","Miel","frasco",1],
    ["Comida","Pan rallado","paquete",1],["Comida","Aceite","litro",1],
  ];
  items = seed.map(([cat,name,unit,target]) => ({
    id:'i_'+Math.random().toString(36).slice(2),
    name, cat, unit, target, current:0, lastPrice:0, lastPurchase:null
  }));
  saveAll();
}

function saveAll() {
  localStorage.setItem('stock_items', JSON.stringify(items));
  localStorage.setItem('stock_movements', JSON.stringify(movements));
}

// ── HELPERS ────────────────────────────────────────────
function getStatus(i) {
  if (i.current <= 0) return 'out';
  if (i.current < i.target) return 'low';
  return 'ok';
}
function statusDot(s) { return s==='ok'?'dot-ok':s==='low'?'dot-low':'dot-out'; }
function fmt(n) { return '$'+Math.round(n).toLocaleString('es-AR'); }
function fmtDate(ts) {
  const d = new Date(ts);
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}

// ── FILTROS ────────────────────────────────────────────
function filterItems(list, tabKey) {
  const f = activeFilter[tabKey];
  if (f === 'Todos') return list;
  return list.filter(i => resolveGroup(i.cat) === f);
}

function filterMovements(list, tabKey) {
  const f = activeFilter[tabKey];
  if (f === 'Todos') return list;
  return list.filter(m => {
    const item = items.find(i => i.id === m.itemId);
    return item ? resolveGroup(item.cat) === f : false;
  });
}

function buildFilterBar(containerId, tabKey, includeAll=true) {
  const el = document.getElementById(containerId);
  const cats = getAllCats();
  const chips = includeAll ? ['Todos', ...cats] : cats;
  el.innerHTML = chips.map(c => {
    const icon = c === 'Todos' ? '🔍' : (CAT_ICONS[c] || '📦');
    return `<div class="filter-chip${activeFilter[tabKey]===c?' active':''}"
      onclick="setFilter('${tabKey}','${c}')">${icon} ${c}</div>`;
  }).join('');
}

function setFilter(tabKey, cat) {
  activeFilter[tabKey] = cat;
  render();
}

// ── RENDER ─────────────────────────────────────────────
function render() {
  renderComprar(); renderStock(); renderHistorial(); renderItemsPage(); renderHeader();
}

function renderHeader() {
  const out = items.filter(i=>getStatus(i)==='out').length;
  const low = items.filter(i=>getStatus(i)==='low').length;
  document.getElementById('headerSub').textContent =
    `${out} sin stock · ${low} a reponer · ${items.length} items`;
}

function renderComprar() {
  buildFilterBar('filterComprar','comprar');
  const filtered = filterItems(items, 'comprar');
  const out = filtered.filter(i=>getStatus(i)==='out').length;
  const low = filtered.filter(i=>getStatus(i)==='low').length;
  const ok  = filtered.filter(i=>getStatus(i)==='ok').length;
  document.getElementById('statOut').textContent = items.filter(i=>getStatus(i)==='out').length;
  document.getElementById('statLow').textContent = items.filter(i=>getStatus(i)==='low').length;
  document.getElementById('statOk').textContent  = items.filter(i=>getStatus(i)==='ok').length;

  const toReponer = filtered.filter(i=>getStatus(i)==='out'||getStatus(i)==='low');
  const el = document.getElementById('buyList');
  if (!toReponer.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">✅</div>Todo el stock está completo</div>';
    return;
  }
  const byCat = {};
  toReponer.forEach(i => { const g=resolveGroup(i.cat); if(!byCat[g]) byCat[g]=[]; byCat[g].push(i); });
  el.innerHTML = Object.entries(byCat).map(([cat,citems]) =>
    `<div class="cat-header">${CAT_ICONS[cat]||'📦'} ${cat}</div>` +
    citems.map(i => {
      const s = getStatus(i);
      const badge = s==='out'?'<span class="badge badge-red">SIN STOCK</span>':'<span class="badge badge-yellow">REPONER</span>';
      return `<div class="stock-item" onclick="quickMov('${i.id}')">
        <div class="stock-dot ${statusDot(s)}"></div>
        <div class="stock-info">
          <div class="stock-name">${i.name}</div>
          <div class="stock-meta">${badge} · necesitás ${i.target} ${i.unit}</div>
        </div>
        <div class="stock-qty">
          <div class="qty-main" style="color:${s==='out'?'var(--red)':'var(--yellow)'}">${i.current}</div>
          <div class="qty-unit">${i.unit}</div>
        </div>
      </div>`;
    }).join('')
  ).join('');
}

function renderStock() {
  buildFilterBar('filterStock','stock');
  const filtered = filterItems(items, 'stock');
  const el = document.getElementById('stockList');
  if (!filtered.length) { el.innerHTML='<div class="empty-state"><div class="empty-icon">📦</div>Sin items en esta categoría</div>'; return; }
  const byCat = {};
  filtered.forEach(i => { const g=resolveGroup(i.cat); if(!byCat[g]) byCat[g]=[]; byCat[g].push(i); });
  el.innerHTML = Object.entries(byCat).map(([cat,citems]) =>
    `<div class="cat-header" style="padding:8px 0 4px">${CAT_ICONS[cat]||'📦'} ${cat}</div>
    <div class="card" style="padding:8px 16px">` +
    citems.map(i => {
      const s = getStatus(i);
      return `<div class="stock-item" onclick="quickMov('${i.id}')">
        <div class="stock-dot ${statusDot(s)}"></div>
        <div class="stock-info">
          <div class="stock-name">${i.name}</div>
          <div class="stock-meta">Obj: ${i.target} ${i.unit}${i.lastPrice?` · ${fmt(i.lastPrice)}`:''}${i.lastPurchase?` · ${fmtDate(i.lastPurchase)}`:''}</div>
        </div>
        <div class="stock-qty">
          <div class="qty-main" style="color:${s==='ok'?'var(--green)':s==='low'?'var(--yellow)':'var(--red)'}">${i.current}</div>
          <div class="qty-unit">${i.unit}</div>
        </div>
      </div>`;
    }).join('') + '</div>'
  ).join('');
}

function renderHistorial() {
  buildFilterBar('filterHistorial','historial');
  const filtered = filterMovements(movements, 'historial');
  const el = document.getElementById('histList');
  if (!filtered.length) { el.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div>Sin movimientos</div>'; return; }
  const sorted = [...filtered].sort((a,b)=>b.ts-a.ts);
  const groups = {};
  sorted.forEach(m => { const d=fmtDate(m.ts); if(!groups[d]) groups[d]=[]; groups[d].push(m); });
  el.innerHTML = Object.entries(groups).map(([date,movs]) =>
    `<div class="cat-header">${date}</div>
    <div class="card" style="padding:8px 16px">` +
    movs.map(m =>
      `<div class="mov-item">
        <span class="mov-badge ${m.type==='compra'?'mov-compra':'mov-uso'}">${m.type==='compra'?'COMPRA':'USO'}</span>
        <div class="mov-info">
          <div class="mov-name">${m.itemName}</div>
          <div class="mov-meta">${m.notes||m.cat}</div>
        </div>
        <div class="mov-right">
          <div class="mov-qty">${m.type==='compra'?'+':'−'}${m.qty} ${m.unit}</div>
          ${m.price?`<div class="mov-price">${fmt(m.price)}/u</div>`:''}
        </div>
        <button class="mov-delete" onclick="deleteMov('${m.id}')">✕</button>
      </div>`
    ).join('') + '</div>'
  ).join('');
}

function renderItemsPage() {
  buildFilterBar('filterItems','items');
  const filtered = filterItems(items, 'items');
  const el = document.getElementById('itemList');
  if (!filtered.length) { el.innerHTML='<div class="empty-state"><div class="empty-icon">📦</div>Sin items</div>'; return; }
  const byCat = {};
  filtered.forEach(i => { const g=resolveGroup(i.cat); if(!byCat[g]) byCat[g]=[]; byCat[g].push(i); });
  el.innerHTML = Object.entries(byCat).map(([cat,citems]) =>
    `<div class="cat-header">${CAT_ICONS[cat]||'📦'} ${cat}</div>` +
    citems.map(i =>
      `<div class="item-manage">
        <div class="item-manage-info">
          <div class="item-manage-name">${i.name}</div>
          <div class="item-manage-meta">Obj: ${i.target} ${i.unit} · Stock: ${i.current} ${i.unit}</div>
        </div>
        <button class="item-edit-btn" onclick="openItemModal('${i.id}')">Editar</button>
        <button class="item-del-btn"  onclick="deleteItem('${i.id}')">✕</button>
      </div>`
    ).join('')
  ).join('');
}

// ── MOVIMIENTO ─────────────────────────────────────────
function openMovModal(preItemId) {
  movType = null;
  document.getElementById('movOverlay').classList.add('open');
  document.getElementById('btnCompra').className = 'type-btn';
  document.getElementById('btnUso').className    = 'type-btn';
  document.getElementById('movQty').value   = '';
  document.getElementById('movPrice').value = '';
  document.getElementById('movNotes').value = '';
  document.getElementById('priceGroup').style.display = 'none';
  document.getElementById('movSaveBtn').disabled = true;
  const sel = document.getElementById('movItem');
  sel.innerHTML = '<option value="">Seleccioná...</option>' +
    [...items].sort((a,b)=>a.name.localeCompare(b.name))
      .map(i=>`<option value="${i.id}">${i.name} (${i.current} ${i.unit})</option>`).join('');
  if (preItemId) sel.value = preItemId;
}

function quickMov(id) { openMovModal(id); }

function selType(t) {
  movType = t;
  document.getElementById('btnCompra').className = t==='compra'?'type-btn selected-compra':'type-btn';
  document.getElementById('btnUso').className    = t==='uso'   ?'type-btn selected-uso'   :'type-btn';
  document.getElementById('priceGroup').style.display = t==='compra'?'block':'none';
  movCheck();
}

function movCheck() {
  const qty  = parseFloat(document.getElementById('movQty').value);
  const item = document.getElementById('movItem').value;
  document.getElementById('movSaveBtn').disabled = !(movType && qty>0 && item);
}

function saveMov() {
  const itemId = document.getElementById('movItem').value;
  const qty    = parseFloat(document.getElementById('movQty').value);
  const price  = parseFloat(document.getElementById('movPrice').value)||0;
  const notes  = document.getElementById('movNotes').value.trim();
  const item   = items.find(i=>i.id===itemId);
  if (!item||!qty||!movType) return;
  movements.push({ id:'m_'+Date.now(), ts:Date.now(), type:movType, itemId, itemName:item.name, cat:item.cat, unit:item.unit, qty, price, notes });
  if (movType==='compra') {
    item.current = +(item.current+qty).toFixed(3);
    if (price) { item.lastPrice=price; item.lastPurchase=Date.now(); }
  } else {
    item.current = Math.max(0, +(item.current-qty).toFixed(3));
  }
  saveAll(); closeModal('movOverlay'); render();
}

function deleteMov(id) {
  if (!confirm('¿Eliminar? No revierte el stock.')) return;
  movements = movements.filter(m=>m.id!==id);
  saveAll(); render();
}

// ── ITEM ABM ───────────────────────────────────────────
function openItemModal(editId) {
  document.getElementById('itemOverlay').classList.add('open');
  document.getElementById('iEditId').value = editId||'';
  document.getElementById('newCatRow').style.display = 'none';
  document.getElementById('newCatInput').value = '';
  buildCatSelect();
  if (editId) {
    const i = items.find(x=>x.id===editId);
    document.getElementById('itemModalTitle').textContent = 'Editar item';
    document.getElementById('iName').value   = i.name;
    document.getElementById('iCat').value    = i.cat;
    document.getElementById('iUnit').value   = i.unit;
    document.getElementById('iTarget').value = i.target;
  } else {
    document.getElementById('itemModalTitle').textContent = 'Nuevo item';
    document.getElementById('iName').value   = '';
    document.getElementById('iCat').value    = '';
    document.getElementById('iUnit').value   = 'unid';
    document.getElementById('iTarget').value = '1';
  }
  itemCheck();
}

function buildCatSelect(selectedVal) {
  const sel = document.getElementById('iCat');
  const prev = selectedVal || sel.value;
  sel.innerHTML = '<option value="">Seleccioná...</option>' +
    getAllCats().map(c=>`<option value="${c}"${c===prev?' selected':''}>${CAT_ICONS[c]||'📦'} ${c}</option>`).join('') +
    '<option value="__nueva__">➕ Nueva categoría...</option>';
  sel.value = prev || '';
}

function onCatChange() {
  const val = document.getElementById('iCat').value;
  document.getElementById('newCatRow').style.display = val==='__nueva__' ? 'flex' : 'none';
  if (val==='__nueva__') document.getElementById('newCatInput').focus();
  itemCheck();
}

function confirmNewCat() {
  const name = document.getElementById('newCatInput').value.trim();
  if (!name) return;
  const customs = getCustomCats();
  if (!getAllCats().includes(name)) {
    customs.push(name);
    saveCustomCats(customs);
    if (!CAT_ICONS[name]) CAT_ICONS[name] = '📦';
  }
  buildCatSelect(name);
  document.getElementById('newCatRow').style.display = 'none';
  document.getElementById('newCatInput').value = '';
  itemCheck();
}

function itemCheck() {
  const n = document.getElementById('iName').value.trim();
  const c = document.getElementById('iCat').value;
  document.getElementById('itemSaveBtn').disabled = !(n && c && c !== '__nueva__');
}

function saveItem() {
  const editId = document.getElementById('iEditId').value;
  const name   = document.getElementById('iName').value.trim();
  const cat    = document.getElementById('iCat').value;
  const unit   = document.getElementById('iUnit').value;
  const target = parseFloat(document.getElementById('iTarget').value)||1;
  if (!name||!cat||cat==='__nueva__') return;
  if (editId) {
    Object.assign(items.find(x=>x.id===editId), {name,cat,unit,target});
  } else {
    items.push({id:'i_'+Date.now(),name,cat,unit,target,current:0,lastPrice:0,lastPurchase:null});
  }
  saveAll(); closeModal('itemOverlay'); render();
}

function deleteItem(id) {
  if (!confirm('¿Eliminar este item?')) return;
  items = items.filter(i=>i.id!==id);
  saveAll(); render();
}

// ── UTILS ──────────────────────────────────────────────
function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('page-'+tab).classList.add('active');
  render();
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function handleOverlay(e,id) { if(e.target===document.getElementById(id)) closeModal(id); }

render();
</script>
</body>
</html>
