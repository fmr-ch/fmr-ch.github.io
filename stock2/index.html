<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0f1a">
<title>Stock</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f0f1a;--card:#1a1a2e;--card2:#16213e;--accent:#4f8ef7;--green:#2ecc71;--yellow:#f39c12;--red:#e74c3c;--text:#f0f0f0;--muted:#8888aa;--border:#2a2a4a}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:80px}
.header{background:var(--card);padding:14px 20px 10px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
.header h1{font-size:18px;font-weight:700}
.header-stats{display:flex;gap:14px;margin-top:5px}
.hstat{font-size:11px;color:var(--muted)}.hstat span{font-weight:700}
.red{color:var(--red)}.yellow{color:var(--yellow)}.green{color:var(--green)}
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:57px;z-index:99}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.page{display:none;padding:14px 16px}.page.active{display:block}
.filter-bar{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 13px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border);color:var(--muted);background:var(--card);cursor:pointer;transition:all .15s}
.chip.active{border-color:var(--accent);background:rgba(79,142,247,.15);color:var(--accent)}
.item{background:var(--card);border-radius:14px;padding:13px 16px;margin-bottom:10px;border:1px solid var(--border)}
.item-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dot-ok{background:var(--green);box-shadow:0 0 5px var(--green)}
.dot-low{background:var(--yellow);box-shadow:0 0 5px var(--yellow)}
.dot-out{background:var(--red);box-shadow:0 0 5px var(--red)}
.item-name{font-size:14px;font-weight:700;flex:1}
.item-meta{font-size:11px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.item-ctrl{display:flex;align-items:center;margin-bottom:8px}
.btn-adj{width:44px;height:44px;border-radius:50%;border:none;background:var(--card2);color:var(--text);font-size:22px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.btn-adj:active{background:var(--accent)}
.qty-display{flex:1;text-align:center;font-size:17px;font-weight:700}
.qty-unit{font-size:11px;color:var(--muted);font-weight:400;margin-left:3px}
.progress-wrap{background:var(--border);border-radius:4px;height:4px;overflow:hidden}
.progress-bar{height:100%;border-radius:4px;transition:width .3s}
.bar-ok{background:var(--green)}.bar-low{background:var(--yellow)}.bar-out{background:var(--red)}
.lugar-header{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--accent);font-weight:700;padding:10px 2px 6px}
.compra-item{background:var(--card);border-radius:14px;padding:12px 14px;margin-bottom:8px;border:1px solid var(--border)}
.compra-row1{display:flex;align-items:center;gap:10px}
.compra-name{font-size:14px;font-weight:700;flex:1}
.falta-badge{background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.4);border-radius:10px;padding:3px 10px;font-size:13px;font-weight:800;color:var(--red);white-space:nowrap}
.compra-row2{display:flex;align-items:center;gap:8px;margin-top:7px}
.compra-detail{font-size:11px;color:var(--muted);flex:1}
.btn-comprar{background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:12px;font-weight:700;padding:6px 14px;cursor:pointer;white-space:nowrap}
.price-val{color:var(--text);font-weight:600}
.hist-item{background:var(--card);border-radius:12px;padding:11px 14px;margin-bottom:8px;border:1px solid var(--border);display:flex;align-items:center;gap:10px}
.hist-info{flex:1;min-width:0}
.hist-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-meta{font-size:11px;color:var(--muted);margin-top:2px}
.hist-right{text-align:right;flex-shrink:0}
.hist-price{font-size:15px;font-weight:700;color:var(--green)}
.hist-date{font-size:10px;color:var(--muted);margin-top:1px}
.btn-del{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:4px}
.fab{position:fixed;bottom:24px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:30px;cursor:pointer;box-shadow:0 4px 20px rgba(79,142,247,.4);display:flex;align-items:center;justify-content:center;z-index:200;transition:transform .15s}
.fab:active{transform:scale(.92)}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;align-items:flex-end}
.mbg.open{display:flex}
.modal{background:var(--card2);border-radius:24px 24px 0 0;padding:22px 20px 44px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhandle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.mtitle{font-size:17px;font-weight:700;margin-bottom:4px}
.msub{font-size:12px;color:var(--muted);margin-bottom:18px}
.fg{margin-bottom:14px}
.fl{font-size:12px;color:var(--muted);margin-bottom:6px;display:block}
.fi{width:100%;background:var(--bg);border:2px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-size:22px;font-weight:700;text-align:center;outline:none;transition:border-color .2s;appearance:none}
.fi:focus{border-color:var(--accent)}
.fi[type=number]::-webkit-inner-spin-button{display:none}
.fi-sm{font-size:16px;text-align:left}
.fsel{width:100%;background:var(--bg);border:2px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-size:15px;outline:none;appearance:none;transition:border-color .2s}
.fsel:focus{border-color:var(--accent)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.bsave{width:100%;padding:15px;background:var(--accent);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px}
.bsave:disabled{opacity:.4;cursor:not-allowed}
.empty{text-align:center;color:var(--muted);padding:50px 0}
.empty-icon{font-size:42px;margin-bottom:10px}
.kpi-card{background:var(--card);border-radius:14px;padding:14px 18px;margin-bottom:14px;border:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.kpi-value{font-size:22px;font-weight:800;color:var(--accent)}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:2px}
.item-last-price{font-size:11px;color:var(--yellow);font-weight:600}
</style>
</head>
<body>
<div class="header">
  <h1>🛒 Control de Stock</h1>
  <div class="header-stats">
    <div class="hstat">Sin stock: <span class="red" id="st-out">0</span></div>
    <div class="hstat">Reponer: <span class="yellow" id="st-low">0</span></div>
    <div class="hstat">OK: <span class="green" id="st-ok">0</span></div>
    <div class="hstat">Total: <span id="st-total">0</span></div>
  </div>
</div>
<div class="tabs">
  <div class="tab active" id="tab-stock"    onclick="showTab('stock')">Stock</div>
  <div class="tab"        id="tab-compras"  onclick="showTab('compras')">Compras</div>
  <div class="tab"        id="tab-historial"onclick="showTab('historial')">Historial</div>
</div>
<div class="page active" id="page-stock">
  <div class="filter-bar" id="filter-stock"></div>
  <div id="list-stock"></div>
</div>
<div class="page" id="page-compras">
  <div id="kpi-compras"></div>
  <div class="filter-bar" id="filter-compras"></div>
  <div id="list-compras"></div>
</div>
<div class="page" id="page-historial">
  <div id="list-historial"></div>
</div>

<button class="fab" onclick="openNew()">+</button>

<div class="mbg" id="mbg-new" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle">Nuevo ítem</div>
    <div class="fg">
      <label class="fl">Nombre</label>
      <input type="text" class="fi fi-sm" id="ni-name" placeholder="Ej: Lentejas" oninput="niCheck()">
    </div>
    <div class="frow">
      <div class="fg">
        <label class="fl">Categoría</label>
        <select class="fsel" id="ni-cat">
          <option>Comida</option><option>Limpieza</option><option>Higiene</option><option>Perro</option><option>Casa</option>
        </select>
      </div>
      <div class="fg">
        <label class="fl">Lugar</label>
        <select class="fsel" id="ni-lugar">
          <option>Supermercado</option><option>Verdulería</option><option>Carnicería</option><option>Pescadería</option><option>Dietética</option>
        </select>
      </div>
    </div>
    <div class="frow">
      <div class="fg">
        <label class="fl">Unidad</label>
        <select class="fsel" id="ni-unit">
          <option>unid</option><option>kg</option><option>gramos</option><option>litro</option><option>ml</option><option>paquete</option><option>lata</option><option>pote</option><option>frasco</option><option>atado</option><option>bolsa</option><option>rodajas</option>
        </select>
      </div>
      <div class="fg">
        <label class="fl">Objetivo</label>
        <input type="number" class="fi" id="ni-target" placeholder="0" inputmode="decimal" style="font-size:18px" oninput="niCheck()">
      </div>
    </div>
    <button class="bsave" id="ni-save" onclick="saveNew()" disabled>Agregar ítem</button>
  </div>
</div>

<div class="mbg" id="mbg-buy" onclick="if(event.target===this)closeBuy()">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle" id="buy-title"></div>
    <div class="msub" id="buy-sub"></div>
    <div class="fg">
      <label class="fl">Cantidad comprada</label>
      <input type="number" class="fi" id="buy-qty" placeholder="0" inputmode="decimal" oninput="buyCheck()">
    </div>
    <div class="fg">
      <label class="fl">Precio unitario ($)</label>
      <input type="number" class="fi" id="buy-price" placeholder="0" inputmode="numeric">
    </div>
    <button class="bsave" id="buy-save" onclick="savePurchase()" disabled>Guardar</button>
  </div>
</div>

<script>
const SEED=[
  ["Comida","Supermercado","Huevos","unid",24],
  ["Comida","Supermercado","Pan lactal","paquete",3],
  ["Comida","Supermercado","Yogurt griego","pote",8],
  ["Comida","Supermercado","Yogurt natural","litro",4],
  ["Comida","Dietética","Avena","gramos",200],
  ["Comida","Verdulería","Banana","unid",16],
  ["Comida","Verdulería","Manzana","unid",6],
  ["Comida","Dietética","Frutos secos","gramos",600],
  ["Comida","Dietética","Miel","gramos",300],
  ["Comida","Supermercado","Manteca de maní","frasco",1],
  ["Comida","Carnicería","Pechuga de pollo","kg",3],
  ["Comida","Carnicería","Churrasco","kg",1],
  ["Comida","Carnicería","Carne picada","kg",2],
  ["Comida","Pescadería","Filet de merluza","kg",1],
  ["Comida","Supermercado","Arroz integral","paquete",2],
  ["Comida","Supermercado","Fideos","paquete",2],
  ["Comida","Verdulería","Papa","kg",4],
  ["Comida","Verdulería","Batata","kg",2],
  ["Comida","Verdulería","Calabaza","unid",2],
  ["Comida","Verdulería","Tomate","unid",10],
  ["Comida","Verdulería","Zanahoria","unid",6],
  ["Comida","Verdulería","Cebolla","unid",6],
  ["Comida","Verdulería","Morrón","unid",4],
  ["Comida","Verdulería","Zucchini","unid",2],
  ["Comida","Verdulería","Lechuga","unid",2],
  ["Comida","Verdulería","Palta","unid",2],
  ["Comida","Supermercado","Leche","litro",4],
  ["Comida","Supermercado","Jamón","gramos",350],
  ["Comida","Supermercado","Queso en feta","gramos",650],
  ["Comida","Supermercado","Queso crema","frasco",1],
  ["Comida","Supermercado","Queso cremoso","gramos",200],
  ["Comida","Supermercado","Crema de leche","pote",2],
  ["Comida","Supermercado","Atún en lata","lata",8],
  ["Comida","Verdulería","Espinaca","atado",2],
  ["Comida","Supermercado","Galletas de arroz","paquete",1],
  ["Comida","Dietética","Granola","gramos",200],
  ["Comida","Supermercado","Pan rallado","paquete",1],
  ["Comida","Supermercado","Pascualina","paquete",1],
  ["Comida","Supermercado","Salsa de tomate","lata",2],
  ["Comida","Supermercado","Manteca","paquete",1]
];
const LI={"Supermercado":"🛒","Verdulería":"🥬","Carnicería":"🥩","Pescadería":"🐟","Dietética":"🌾"};
const STEP={kg:0.1,litro:0.25,gramos:25,unid:1,paquete:1,frasco:1,lata:1,pote:1,atado:1,bolsa:1,rodajas:1};
const PRICES={
  'Huevos':230,'Pan lactal':4000,'Yogurt griego':1300,'Yogurt natural':2500,
  'Manteca de maní':5000,'Arroz integral':2500,'Fideos':1600,'Leche':1800,
  'Jamón':14.67,'Queso en feta':20,'Queso crema':3800,'Queso cremoso':11,
  'Crema de leche':2800,'Atún en lata':2800,'Galletas de arroz':2000,
  'Pan rallado':3500,'Pascualina':2500,'Salsa de tomate':1000,'Manteca':2600,
  'Banana':333,'Manzana':800,'Papa':1200,'Batata':2000,'Calabaza':3000,
  'Tomate':1000,'Zanahoria':150,'Cebolla':150,'Morrón':1000,'Zucchini':800,
  'Lechuga':2000,'Palta':1500,'Espinaca':3800,
  'Pechuga de pollo':18000,'Churrasco':18000,'Carne picada':18000,
  'Filet de merluza':10000,
  'Avena':7.5,'Frutos secos':25,'Miel':10,'Granola':12.5
};
// Migrar datos del formato anterior si existen
(function(){
  if(!localStorage.getItem('stock_v2') && localStorage.getItem('stock_items')){
    try{
      const old=JSON.parse(localStorage.getItem('stock_items'));
      if(old&&old.length){
        const migrated=old.map(i=>({
          id:i.id, cat:i.cat, lugar:'Supermercado',
          name:i.name, unit:i.unit, target:i.target, current:i.current||0
        }));
        localStorage.setItem('stock_v2',JSON.stringify(migrated));
      }
    }catch(e){}
  }
})();
// Migrar Pan lactal de rodajas a paquete si viene de versión anterior
(function(){var v=JSON.parse(localStorage.getItem('stock_v2')||'null');if(v&&v.length){var changed=false;v.forEach(function(i){if(i.name==='Pan lactal'&&i.unit==='rodajas'){i.unit='paquete';i.target=3;i.current=0;changed=true;}});if(changed)localStorage.setItem('stock_v2',JSON.stringify(v));}})();
let items=JSON.parse(localStorage.getItem('stock_v2')||'null');
let purchases=JSON.parse(localStorage.getItem('stock_purchases')||'[]');
let buyItemId=null,fS='Todos',fC='Todos';
if(!items||!items.length){
  // Limpiar cualquier dato corrupto y arrancar con el seed completo
  items=SEED.map(([cat,lugar,name,unit,target],i)=>({id:'i'+i,cat,lugar,name,unit,target,current:0}));
  save();
}
function save(){localStorage.setItem('stock_v2',JSON.stringify(items));localStorage.setItem('stock_purchases',JSON.stringify(purchases));}
function stp(u){return STEP[u]??1;}
function fq(n,u){if(u==='kg'||u==='litro')return parseFloat(n.toFixed(1));if(u==='gramos')return Math.round(n);return n%1===0?n:parseFloat(n.toFixed(2));}
function fp(n){if(!n||n===0)return null;return '$'+Math.round(n).toLocaleString('es-AR');}
function fd(ts){const d=new Date(ts);return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();}
function gs(i){if(i.current<=0)return'out';if(i.current<i.target)return'low';return'ok';}
function glp(id){const ps=purchases.filter(p=>p.itemId===id&&p.price>0);if(ps.length)return ps.sort((a,b)=>b.ts-a.ts)[0].price;const item=items.find(i=>i.id===id);return(item&&PRICES[item.name])||0;}
function gap(id){const ps=purchases.filter(p=>p.itemId===id&&p.price>0);if(!ps.length)return 0;return ps.reduce((s,p)=>s+p.price,0)/ps.length;}
function getLugares(){return['Todos',...new Set(items.map(i=>i.lugar))];}
function adjust(id,dir){const item=items.find(i=>i.id===id);if(!item)return;item.current=Math.max(0,parseFloat((item.current+dir*stp(item.unit)).toFixed(3)));save();renderAll();}
function openNew(){document.getElementById('ni-name').value='';document.getElementById('ni-target').value='';document.getElementById('ni-save').disabled=true;document.getElementById('mbg-new').classList.add('open');setTimeout(()=>document.getElementById('ni-name').focus(),300);}
function niCheck(){const n=document.getElementById('ni-name').value.trim(),t=parseFloat(document.getElementById('ni-target').value);document.getElementById('ni-save').disabled=!(n&&t>0);}
function saveNew(){const name=document.getElementById('ni-name').value.trim();const cat=document.getElementById('ni-cat').value;const lugar=document.getElementById('ni-lugar').value;const unit=document.getElementById('ni-unit').value;const target=parseFloat(document.getElementById('ni-target').value)||1;if(!name)return;items.push({id:'i'+Date.now(),cat,lugar,name,unit,target,current:0});save();document.getElementById('mbg-new').classList.remove('open');renderAll();}
function openBuy(id){const item=items.find(i=>i.id===id);if(!item)return;buyItemId=id;document.getElementById('buy-title').textContent=item.name;document.getElementById('buy-sub').textContent='Faltan '+fq(Math.max(0,item.target-item.current),item.unit)+' '+item.unit+' para el objetivo';document.getElementById('buy-qty').value='';document.getElementById('buy-price').value='';document.getElementById('buy-save').disabled=true;document.getElementById('mbg-buy').classList.add('open');}
function buyCheck(){document.getElementById('buy-save').disabled=!(parseFloat(document.getElementById('buy-qty').value)>0);}
function savePurchase(){const item=items.find(i=>i.id===buyItemId);if(!item)return;const qty=parseFloat(document.getElementById('buy-qty').value)||0;const price=parseFloat(document.getElementById('buy-price').value)||0;if(qty<=0)return;purchases.push({id:'p'+Date.now(),ts:Date.now(),itemId:item.id,itemName:item.name,itemUnit:item.unit,qty,price});item.current=parseFloat((item.current+qty).toFixed(3));save();closeBuy();renderAll();}
function closeBuy(){document.getElementById('mbg-buy').classList.remove('open');buyItemId=null;}
function deletePurchase(id){purchases=purchases.filter(p=>p.id!==id);save();renderHistorial();}
function deleteItem(id){
  var item=items.find(function(i){return i.id===id;});
  if(!item)return;
  if(!confirm('¿Eliminar "'+item.name+'"?'))return;
  items=items.filter(function(i){return i.id!==id;});
  save();renderAll();
}
function renderAll(){renderHeader();renderStock();renderCompras();renderHistorial();}
function renderHeader(){document.getElementById('st-out').textContent=items.filter(i=>gs(i)==='out').length;document.getElementById('st-low').textContent=items.filter(i=>gs(i)==='low').length;document.getElementById('st-ok').textContent=items.filter(i=>gs(i)==='ok').length;document.getElementById('st-total').textContent=items.length;}
function chips(cid,cur,fn,optFn){document.getElementById(cid).innerHTML=optFn().map(c=>'<div class="chip'+(cur===c?' active':'')+'" onclick="'+fn+'(\''+c+'\')">'+c+'</div>').join('');}
function setFS(c){fS=c;renderStock();}
function setFC(c){fC=c;renderCompras();}
function renderStock(){
  chips('filter-stock',fS,'setFS',()=>['Todos',...new Set(items.map(i=>i.cat))]);
  const fl=fS==='Todos'?items:items.filter(i=>i.cat===fS);
  const el=document.getElementById('list-stock');
  if(!fl.length){el.innerHTML=empty('\u{1F4E6}','Sin ítems');return;}
  el.innerHTML=fl.map(function(item){
    const s=gs(item),dc=s==='ok'?'dot-ok':s==='low'?'dot-low':'dot-out',bc=s==='ok'?'bar-ok':s==='low'?'bar-low':'bar-out';
    const pct=item.target>0?Math.min(100,(item.current/item.target)*100):0;
    const qty=fq(item.current,item.unit),tgt=fq(item.target,item.unit);
    const lp=fp(glp(item.id)),ap=fp(gap(item.id));
    const ps=lp?'&Uacute;ltimo: <span class="price-val">'+lp+'</span>'+(ap?' &middot; Hab: <span class="price-val">'+ap+'</span>':''):'';
    const id=item.id;
    return '<div class="item">'
      +'<div class="item-top">'
        +'<div class="dot '+dc+'"></div>'
        +'<div class="item-name">'+item.name+'</div>'
        +'<button class="btn-del-item" onclick="deleteItem(\''+id+'\')" title="Eliminar">&#x1F5D1;</button>'
      +'</div>'
      +'<div class="item-meta"><span>Obj: '+tgt+' '+item.unit+'</span>'+(ps?'<span>'+ps+'</span>':'')+'</div>'
      +'<div class="item-ctrl">'
        +'<button class="btn-adj" onclick="adjust(\''+id+'\',-1)">−</button>'
        +'<div class="qty-display">'+qty+'<span class="qty-unit">'+item.unit+'</span></div>'
        +'<button class="btn-adj" onclick="adjust(\''+id+'\',1)">+</button>'
      +'</div>'
      +'<div class="progress-wrap"><div class="progress-bar '+bc+'" style="width:'+pct+'%"></div></div>'
      +'</div>';
  }).join('');
}
function renderCompras(){
  chips('filter-compras',fC,'setFC',getLugares);
  const all=(fC==='Todos'?items:items.filter(i=>i.lugar===fC)).filter(i=>i.current<i.target);
  const el=document.getElementById('list-compras');
  const kpiEl=document.getElementById('kpi-compras');
  if(!all.length){el.innerHTML=empty('✅','Todo el stock completo');kpiEl.innerHTML='';return;}
  let total=0,sinP=0;
  all.forEach(function(item){
    var falta=Math.max(0,item.target-item.current);
    var lp=glp(item.id);
    if(lp>0)total+=falta*lp;else sinP++;
  });
  kpiEl.innerHTML='<div class="kpi-card"><div><div class="kpi-label">Total estimado de compra</div><div class="kpi-sub">'+(sinP>0?sinP+' ítem'+(sinP>1?'s':'')+' sin precio histórico':'Basado en último precio registrado')+'</div></div><div class="kpi-value">'+(fp(total)||'$0')+'</div></div>';
  var g={};all.forEach(function(i){if(!g[i.lugar])g[i.lugar]=[];g[i.lugar].push(i);});
  Object.values(g).forEach(function(a){a.sort(function(a,b){var sa=gs(a),sb=gs(b);if(sa==='out'&&sb!=='out')return -1;if(sb==='out'&&sa!=='out')return 1;return a.name.localeCompare(b.name);});});
  el.innerHTML=Object.entries(g).map(function(entry){
    var lugar=entry[0],gi=entry[1];
    var icon=LI[lugar]||'\u{1F3EA}';
    return '<div class="lugar-header">'+icon+' '+lugar+'</div>'+gi.map(function(item){
      var falta=fq(item.target-item.current,item.unit);
      var curr=fq(item.current,item.unit);
      var tgt=fq(item.target,item.unit);
      var lp=glp(item.id);
      var lpFmt=fp(lp);
      var est=lp>0?fp(Math.max(0,item.target-item.current)*lp):null;
      var dot=gs(item)==='out'?'dot-out':'dot-low';
      var priceRow=lpFmt
        ?('<br><span class="item-last-price">Último: '+lpFmt+'/u'+(est?' &middot; Est: <strong>'+est+'</strong>':'')+'</span>')
        :'<br><span style="font-size:10px;color:var(--muted)">Sin precio histórico</span>';
      return '<div class="compra-item">'
        +'<div class="compra-row1">'
          +'<div class="dot '+dot+'"></div>'
          +'<div class="compra-name">'+item.name+'</div>'
          +'<div class="falta-badge">+'+falta+' '+item.unit+'</div>'
        +'</div>'
        +'<div class="compra-row2">'
          +'<div class="compra-detail">Tenés '+curr+' · Obj '+tgt+priceRow+'</div>'
          +'<button class="btn-comprar" onclick="openBuy(\''+item.id+'\')">+ Compra</button>'
        +'</div>'
        +'</div>';
    }).join('');
  }).join('');
}
function renderHistorial(){
  const el=document.getElementById('list-historial');
  if(!purchases.length){el.innerHTML=empty('📋','Sin compras registradas');return;}
  el.innerHTML=[...purchases].sort((a,b)=>b.ts-a.ts).map(p=>'<div class="hist-item"><div class="hist-info"><div class="hist-name">'+p.itemName+'</div><div class="hist-meta">'+p.qty+' '+p.itemUnit+'</div></div><div class="hist-right"><div class="hist-price">'+(p.price?fp(p.price)+'/u':'Sin precio')+'</div><div class="hist-date">'+fd(p.ts)+'</div></div><button class="btn-del" onclick="deletePurchase(\''+p.id+'\')">✕</button></div>').join('');
}
function empty(icon,text){return'<div class="empty"><div class="empty-icon">'+icon+'</div><div>'+text+'</div></div>';}
function showTab(tab){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('tab-'+tab).classList.add('active');document.getElementById('page-'+tab).classList.add('active');}
renderAll();
</script>
